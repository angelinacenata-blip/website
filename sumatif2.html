<html> 
<head>
<title>Formulir Pendaftaran Siswa</title>
<link rel="stylesheet" href="sumatif2.css">
</head>
<body>

<div class="container">
	<h1> Formulir Pendaftaran Siswa </h1>
	<label> Nama lengkap* </label>
	<input type="text" id="name" placeholder="Contoh:Muhammad Raihan">
	<label> Kelas* </label>
	<input type="text" id="Kelas" placeholder="Contoh:XII IPA 2/ 11A/ 7B">
	<label> | Pilih Ekstrakurikuler(3 pilihan) </label>
	<label>
		<input type="radio" name="| Pilih Ekstrakurikuler(3 pilihan)" value= "Basket">Basket
	</label>
	<label>
		<input type="radio" name="| Pilih Ekstrakurikuler(3 pilihan)" value= "Futsal">Futsal
	</label>
	<label>
		<input type="radio" name="| Pilih Ekstrakurikuler(3 pilihan)" value= "Paduan Suara">Paduan Suara
	</label>
		<label> | Pilih Jadwal Belajar(wajib pilih salah satu) </label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar(wajib pilih salah satu)" value= "Pagi(07.00-12.00)">Pagi(07.00-12.00)
	</label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar(wajib pilih salah satu)" value= "Siang(12.30-17.00)">Siang(12.30-17.00)
	</label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar(wajib pilih salah satu)" value= "Sore(17.30-20.30)">Sore(17.30-20.30)
	</label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar(wajib pilih salah satu)" value= "Campuran(fleksibel)">Campuran(fleksibel)
	</label>
	<button id="tampil"> Daftar Sekarang</button>
	
	<button id="tampil"> Show Your Data</button>
	<div class="kotak2" id="hasil">
		Data Anda akan ditampilkan di sini...
	</div>
</div>
<script src="sumatif2.js"></script>
</body>
</html>
